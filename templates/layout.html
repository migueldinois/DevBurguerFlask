<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevBurger - Flex & Grid 2025</title>

    <!-- FONTES -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Oswald:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- ÍCONES -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />

    <!-- SEUS CSS -->
    <link rel="stylesheet" href="../static/src/css/reset.css" />
    <link rel="stylesheet" href="../static/src/css/variables.css" />
    <link rel="stylesheet" href="../static/src/css/main.css" />
    <link rel="stylesheet" href="../static/src/css/media.css" />

    {% block css_adicional %}{% endblock %}

    <style>
      body {
        font-family: 'Roboto', sans-serif;
      }

      h1, h2, h3 {
        font-family: 'Oswald', sans-serif;
        letter-spacing: 1px;
      }

      /* HEADER */
      .header {
        background: #111;
      }

      /* 🔥 CORREÇÃO PRINCIPAL */
      .header__container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
      }

      .header__logo {
        color: #fff;
        font-family: 'Oswald', sans-serif;
        font-size: 24px;
        letter-spacing: 1px;
      }

      .header__nav {}

      .header__menu {
        display: flex;
        gap: 20px;
        list-style: none;
      }

      .header__link {
        color: #ddd;
        transition: 0.3s;
        text-decoration: none;
      }

      .header__link:hover {
        color: #fff;
      }

      /* 🔥 CORREÇÃO DOS ÍCONES */
      .header__social {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .header__icon {
        background: none;
        border: none;
        cursor: pointer;
        color: white;

        display: flex;
        align-items: center;
        justify-content: center;

        width: 40px;
        height: 40px;
      }

      .material-symbols-outlined {
        color: white;
        font-size: 26px;
        line-height: 1;
      }

      /* BOTÃO MENU */
      .header__toggle {
        background: none;
        border: none;
        color: white;
        display: flex;
        align-items: center;
        cursor: pointer;
      }

      /* CARRINHO */
      .cart {
        position: fixed;
        top: 0;
        right: -400px;
        width: 350px;
        height: 100%;
        background: #fff;
        box-shadow: -3px 0 15px rgba(0,0,0,0.2);
        transition: right 0.3s ease;
        display: flex;
        flex-direction: column;
        z-index: 1000;
      }

      .cart.active {
        right: 0;
      }

      .cart__header {
        display: flex;
        justify-content: space-between;
        padding: 15px;
        border-bottom: 1px solid #ddd;
      }

      .cart__items {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
      }

      .cart__footer {
        padding: 15px;
        border-top: 1px solid #ddd;
      }

      #close-cart {
        background: none;
        border: none;
        font-size: 18px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>

    <!-- HEADER -->
    <header class="header">
      <div class="header__container">
        
        <span style="color:white;">{{ session.usuario }}</span>

        <a href="#" class="header__logo">DevBurger</a>

        <nav class="header__nav">
          <ul class="header__menu">
            <li><a href="#" class="header__link">Home</a></li>
            <li><a href="#menu" class="header__link">Cardápio</a></li>
            <li><a href="#" class="header__link">Sobre</a></li>
            <li><a href="#" class="header__link">Contato</a></li>
          </ul>
        </nav>

        <div class="header__social">
          <a href="#" class="header__icon">
            <span class="material-symbols-outlined">thumb_up</span>
          </a>

          <a href="#" class="header__icon">
            <span class="material-symbols-outlined">photo_camera</span>
          </a>

          <button id="cart-button" class="header__icon">
            <span class="material-symbols-outlined">shopping_cart</span>
          </button>
        </div>

        <button class="header__toggle">
          <span class="material-symbols-outlined">menu</span>
        </button>
      </div>
    </header>

    <!-- CONTEÚDO -->
    {% block conteudo %}
    {% endblock %}

    <!-- CARRINHO -->
    <div id="cart" class="cart">
      <div class="cart__header">
        <h2>Seu Carrinho</h2>
        <button id="close-cart">✖</button>
      </div>

      <div class="cart__items" id="cart-items">

      </div>

      <div class="cart__footer">
        <p>Total: R$ <span id="cart-total">0.00</span></p>
        <button class="button">Finalizar Compra</button>
      </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
      <p class="footer__text">
        DevBurger © 2025. Todos os direitos reservados.
      </p>
    </footer>
    <script src="../static/src/js/carrinho.js"></script>
  </body>
</html>
